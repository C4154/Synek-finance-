<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Rodinné Finance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh}
.app{max-width:430px;margin:0 auto;position:relative;padding-bottom:80px}
.header{background:#1e293b;padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700}
.user-btns{display:flex;gap:8px}
.user-btn{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff}
.content{padding:16px}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px}
.balance-card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:12px}
.balance-label{font-size:13px;color:#94a3b8;margin-bottom:4px}
.balance-amount{font-size:36px;font-weight:800}
.balance-row{display:flex;gap:20px;margin-top:12px}
.balance-sub label{font-size:11px;color:#94a3b8}
.balance-sub span{font-weight:700}
.income{color:#10b981}.expense{color:#f43f5e}
.section-title{font-size:14px;font-weight:700;margin-bottom:10px}
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-bg{background:#0f172a;border-radius:4px;height:6px}
.bar-fill{border-radius:4px;height:6px;transition:width 0.3s}
.tx-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tx-icon{font-size:20px}
.tx-info{flex:1}
.tx-name{font-size:13px;font-weight:600}
.tx-meta{font-size:11px;color:#64748b}
.tx-amount{font-weight:700;font-size:14px}
.warning-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #fbbf24}
.warning-title{font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:8px}
.warning-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#1e293b;display:flex;border-top:1px solid #334155;z-index:10}
.nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:600}
.fab{position:fixed;bottom:90px;right:calc(50% - 210px);border:none;border-radius:50%;width:54px;height:54px;font-size:28px;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:10}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.tx-card{background:#1e293b;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.tx-actions{display:flex;gap:6px}
.icon-btn{background:#334155;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px}
.rec-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:8px}
.rec-header{display:flex;justify-content:space-between;align-items:flex-start}
.rec-name{font-weight:700;font-size:15px}
.rec-meta{font-size:12px;color:#94a3b8}
.rec-urgent{font-size:12px;color:#fbbf24;margin-top:2px}
.del-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;margin-top:4px}
.budget-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:8px}
.budget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.budget-meta{font-size:12px;color:#64748b;margin-bottom:4px}
.over-warning{color:#f43f5e;font-size:11px;margin-top:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#1e293b;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-weight:700;font-size:17px}
.close-btn{background:#334155;border:none;border-radius:8px;color:#94a3b8;padding:4px 10px;cursor:pointer;font-size:18px}
.type-row{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;color:#fff}
.cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cat-btn{padding:6px 12px;border-radius:20px;border:2px solid transparent;cursor:pointer;font-size:13px;color:#e2e8f0}
.rec-types{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.rec-type-btn{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:13px;color:#fff}
input,select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;padding:12px 14px;font-size:15px;margin-bottom:10px}
input::placeholder{color:#475569}
.save-btn{width:100%;border:none;border-radius:12px;color:#fff;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.add-btn{width:100%;background:#6366f1;border:none;border-radius:12px;color:#fff;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px}
.budget-edit{display:flex;gap:6px}
.budget-edit input{width:80px;margin-bottom:0;padding:4px 8px;font-size:13px}
.budget-ok{background:#6366f1;border:none;border-radius:8px;color:#fff;padding:4px 10px;cursor:pointer;font-size:12px}
.set-btn{background:#334155;border:none;border-radius:8px;color:#94a3b8;padding:4px 10px;cursor:pointer;font-size:12px}
.empty{color:#64748b;text-align:center;padding:30px}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;color:#94a3b8;font-size:16px}
.settings-section{margin-bottom:20px}
.settings-label{font-size:12px;color:#94a3b8;margin-bottom:8px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.color-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.user-settings-card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"><div class="loading">🔄 Načítám...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
      apiKey: "AIzaSyBnVtD8JPCVn_ijRdqv0-IdcMdlF8QJChw",
      authDomain: "synek-e66d1.firebaseapp.com",
      projectId: "synek-e66d1",
      storageBucket: "synek-e66d1.firebasestorage.app",
      messagingSenderId: "67544224817",
      appId: "1:67544224817:web:1fd0ae6fc4ea576b8e7110"
    };

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const EXPENSE_CATEGORIES = [
  {id:"food",label:"Jídlo",icon:"🍔",color:"#f97316"},
  {id:"housing",label:"Bydlení",icon:"🏠",color:"#3b82f6"},
  {id:"transport",label:"Doprava",icon:"🚗",color:"#8b5cf6"},
  {id:"entertainment",label:"Zábava",icon:"🎬",color:"#ec4899"},
  {id:"health",label:"Zdraví",icon:"💊",color:"#10b981"},
  {id:"other",label:"Ostatní",icon:"📦",color:"#6b7280"},
];
const INCOME_CATEGORIES = [
  {id:"salary",label:"Výplata",icon:"💼",color:"#10b981"},
  {id:"bonus",label:"Bonus",icon:"🎁",color:"#f59e0b"},
  {id:"other_income",label:"Jiný příjem",icon:"💰",color:"#6b7280"},
];
const ALL_CATEGORIES = [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES];
const RECURRENCE = ["Jednou","Týdně","Měsíčně","Ročně"];
const USER_COLORS = ["#6366f1","#ec4899","#f97316","#10b981","#3b82f6","#8b5cf6"];

let state = {
  activeUser:"user1", tab:"home",
  transactions:[], recurring:[], budgets:{},
  settings:{
    user1:{name:"Partner",color:"#6366f1"},
    user2:{name:"Partnerka",color:"#ec4899"},
  },
  modal:null, editingBudget:null, budgetVal:"",
  filterUser:"all", editingName:null, nameVal:"",
};

function today(){ return new Date().toISOString().split("T")[0]; }
function thisMonth(){ return new Date().toISOString().slice(0,7); }
function formatCZK(n){ return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:0}).format(n||0); }
function daysUntil(d){ return Math.ceil((new Date(d)-new Date(today()))/86400000); }
function getUser(id){ return {id,...(state.settings[id]||{name:id,color:"#6366f1"})}; }
function getCat(id){ return ALL_CATEGORIES.find(c=>c.id===id)||ALL_CATEGORIES[5]; }

function setState(patch){ state={...state,...patch}; render(); }

onSnapshot(collection(db,"transactions"),snap=>{
  state.transactions=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date));
  render();
});
onSnapshot(collection(db,"recurring"),snap=>{
  state.recurring=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});
onSnapshot(doc(db,"settings","budgets"),snap=>{ if(snap.exists()){state.budgets=snap.data();render();} });
onSnapshot(doc(db,"settings","users"),snap=>{ if(snap.exists()){state.settings={...state.settings,...snap.data()};render();} });

async function addTransaction(tx){ await addDoc(collection(db,"transactions"),{userId:state.activeUser,date:today(),...tx}); }
async function updateTransaction(id,tx){ await updateDoc(doc(db,"transactions",id),tx); }
async function deleteTransaction(id){ await deleteDoc(doc(db,"transactions",id)); }
async function addRecurring(r){ await addDoc(collection(db,"recurring"),{userId:state.activeUser,...r}); }
async function deleteRecurring(id){ await deleteDoc(doc(db,"recurring",id)); }
async function saveBudget(catId,amount){ await setDoc(doc(db,"settings","budgets"),{...state.budgets,[catId]:Number(amount)},{merge:true}); }
async function saveUserSettings(uid,patch){ await setDoc(doc(db,"settings","users"),{[uid]:{...state.settings[uid],...patch}},{merge:true}); }

function render(){ document.getElementById("root").innerHTML=buildApp(); attachEvents(); }

function buildApp(){
  const u1=getUser("user1"),u2=getUser("user2"),au=getUser(state.activeUser);
  const monthTx=state.transactions.filter(t=>t.date.startsWith(thisMonth()));
  const totalIncome=monthTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense=monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance=totalIncome-totalExpense;
  const upcoming=state.recurring.filter(r=>{const d=daysUntil(r.nextDate);return d>=0&&d<=7;});

  let content="";
  if(state.tab==="home") content=buildHome(monthTx,totalIncome,totalExpense,balance,upcoming);
  if(state.tab==="transactions") content=buildTransactions();
  if(state.tab==="recurring") content=buildRecurring();
  if(state.tab==="budget") content=buildBudget(monthTx);
  if(state.tab==="settings") content=buildSettings(u1,u2);

  const fab=(state.tab==="home"||state.tab==="transactions")?
    `<button class="fab" id="fabBtn" style="background:${au.color}">+</button>`:"";

  return `<div class="app">
    <div class="header">
      <h1>💰 Rodinné finance</h1>
      <div class="user-btns">
        <button class="user-btn" data-user="user1" style="background:${state.activeUser==="user1"?u1.color:"#334155"}">${u1.name}</button>
        <button class="user-btn" data-user="user2" style="background:${state.activeUser==="user2"?u2.color:"#334155"}">${u2.name}</button>
      </div>
    </div>
    <div class="content">${content}</div>
    <div class="bottom-nav">
      ${[["home","🏠","Přehled"],["transactions","📋","Transakce"],["recurring","🔄","Platby"],["budget","📊","Rozpočet"],["settings","⚙️","Nastavení"]].map(([id,icon,label])=>`
        <button class="nav-btn" data-tab="${id}" style="color:${state.tab===id?"#6366f1":"#64748b"}">
          <span class="nav-icon">${icon}</span><span class="nav-label">${label}</span>
        </button>`).join("")}
    </div>
    ${fab}
    ${state.modal?buildModal():""}
  </div>`;
}

function buildHome(monthTx,totalIncome,totalExpense,balance,upcoming){
  const catTotals=EXPENSE_CATEGORIES.map(c=>({...c,total:monthTx.filter(t=>t.type==="expense"&&t.category===c.id).reduce((s,t)=>s+t.amount,0)}));
  const maxCat=Math.max(...catTotals.map(c=>c.total),1);
  return `
    <div class="balance-card">
      <div class="balance-label">Zůstatek tento měsíc</div>
      <div class="balance-amount" style="color:${balance>=0?"#10b981":"#f43f5e"}">${formatCZK(balance)}</div>
      <div class="balance-row">
        <div class="balance-sub"><label>Příjmy</label><br><span class="income">${formatCZK(totalIncome)}</span></div>
        <div class="balance-sub"><label>Výdaje</label><br><span class="expense">${formatCZK(totalExpense)}</span></div>
      </div>
    </div>
    ${upcoming.length?`
    <div class="warning-card">
      <div class="warning-title">⚠️ Blížící se platby</div>
      ${upcoming.map(r=>`<div class="warning-row"><span>${r.name}</span><span style="color:#fbbf24">${daysUntil(r.nextDate)===0?"Dnes!":`za ${daysUntil(r.nextDate)} dní`} · ${formatCZK(r.amount)}</span></div>`).join("")}
    </div>`:""}
    <div class="card">
      <div class="section-title">Výdaje dle kategorie</div>
      ${catTotals.map(c=>`
        <div class="bar-row">
          <div class="bar-label"><span>${c.icon} ${c.label}</span><span style="color:#94a3b8">${formatCZK(c.total)}</span></div>
          <div class="bar-bg"><div class="bar-fill" style="background:${c.color};width:${(c.total/maxCat)*100}%"></div></div>
        </div>`).join("")}
    </div>
    <div class="card">
      <div class="section-title">Poslední transakce</div>
      ${monthTx.slice(0,5).map(t=>buildTxRow(t)).join("")}
      ${monthTx.length===0?'<div class="empty">Zatím žádné transakce</div>':""}
    </div>`;
}

function buildTxRow(t){
  const cat=getCat(t.category),user=getUser(t.userId);
  return `<div class="tx-row">
    <span class="tx-icon">${cat.icon}</span>
    <div class="tx-info">
      <div class="tx-name">${t.description||cat.label}</div>
      <div class="tx-meta">${t.date} · <span style="color:${user.color}">${user.name}</span></div>
    </div>
    <span class="tx-amount" style="color:${t.type==="income"?"#10b981":"#f43f5e"}">${t.type==="income"?"+":"-"}${formatCZK(t.amount)}</span>
  </div>`;
}

function buildTransactions(){
  const u1=getUser("user1"),u2=getUser("user2");
  const filtered=state.filterUser==="all"?state.transactions:state.transactions.filter(t=>t.userId===state.filterUser);
  return `
    <div class="filter-row">
      <button class="filter-btn" data-filter="all" style="background:${state.filterUser==="all"?"#6366f1":"#1e293b"}">Vše</button>
      <button class="filter-btn" data-filter="user1" style="background:${state.filterUser==="user1"?u1.color:"#1e293b"}">${u1.name}</button>
      <button class="filter-btn" data-filter="user2" style="background:${state.filterUser==="user2"?u2.color:"#1e293b"}">${u2.name}</button>
    </div>
    ${filtered.map(t=>`
      <div class="tx-card">
        <div style="flex:1">${buildTxRow(t)}</div>
        <div class="tx-actions">
          <button class="icon-btn" data-edit="${t.id}" style="color:#94a3b8">✏️</button>
          <button class="icon-btn" data-del="${t.id}" style="color:#f43f5e">🗑️</button>
        </div>
      </div>`).join("")}
    ${filtered.length===0?'<div class="empty">Žádné transakce</div>':""}`;
}

function buildRecurring(){
  return `
    <button class="add-btn" id="addRecBtn">+ Přidat pravidelnou platbu</button>
    ${state.recurring.map(r=>{
      const d=daysUntil(r.nextDate),urgent=d<=3;
      return `<div class="rec-card" style="border:1px solid ${urgent?"#fbbf24":"transparent"}">
        <div class="rec-header">
          <div>
            <div class="rec-name">${r.name}</div>
            <div class="rec-meta">${r.recurrence} · Další: ${r.nextDate}</div>
            ${urgent?`<div class="rec-urgent">⚠️ ${d===0?"Dnes!":`Za ${d} dní`}</div>`:""}
          </div>
          <div style="text-align:right">
            <div style="font-weight:700;color:${r.type==="income"?"#10b981":"#f43f5e"}">${formatCZK(r.amount)}</div>
            <button class="del-btn" data-delrec="${r.id}">Smazat</button>
          </div>
        </div>
      </div>`;
    }).join("")}
    ${state.recurring.length===0?'<div class="empty">Žádné pravidelné platby</div>':""}`;
}

function buildBudget(monthTx){
  const catTotals=EXPENSE_CATEGORIES.map(c=>({...c,total:monthTx.filter(t=>t.type==="expense"&&t.category===c.id).reduce((s,t)=>s+t.amount,0)}));
  return `
    <div style="font-size:13px;color:#94a3b8;margin-bottom:14px">Nastav měsíční limity pro jednotlivé kategorie</div>
    ${catTotals.map(c=>{
      const limit=state.budgets[c.id]||0,pct=limit?Math.min((c.total/limit)*100,100):0,over=limit&&c.total>limit;
      return `<div class="budget-card">
        <div class="budget-header">
          <span style="font-weight:600">${c.icon} ${c.label}</span>
          ${state.editingBudget===c.id?`
            <div class="budget-edit">
              <input id="budgetInput_${c.id}" value="${state.budgetVal}" placeholder="Kč" type="number"/>
              <button class="budget-ok" data-savebudget="${c.id}">OK</button>
            </div>`:
            `<button class="set-btn" data-editbudget="${c.id}" data-budgetval="${limit}">${limit?formatCZK(limit):"Nastavit"} ✏️</button>`}
        </div>
        <div class="budget-meta">Utraceno: ${formatCZK(c.total)}${limit?` / ${formatCZK(limit)}`:""}</div>
        ${limit>0?`<div class="bar-bg"><div class="bar-fill" style="background:${over?"#f43f5e":c.color};width:${pct}%"></div></div>`:""}
        ${over?`<div class="over-warning">⚠️ Překročen limit o ${formatCZK(c.total-limit)}</div>`:""}
      </div>`;
    }).join("")}`;
}

function buildSettings(u1,u2){
  return `
    <div class="settings-section">
      <span class="settings-label">👤 Uživatelé</span>
      ${["user1","user2"].map(uid=>{
        const u=uid==="user1"?u1:u2,editN=state.editingName===uid;
        return `<div class="user-settings-card">
          ${editN?`
            <div style="display:flex;gap:8px;align-items:center">
              <input id="nameInput_${uid}" value="${u.name}" style="margin-bottom:0;flex:1;padding:8px 12px;font-size:14px" placeholder="Jméno"/>
              <button class="budget-ok" data-savename="${uid}">Uložit</button>
            </div>`:
            `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${u.color}"></span>
                <span style="font-weight:700;font-size:16px">${u.name}</span>
              </div>
              <button class="set-btn" data-editname="${uid}" data-nameval="${u.name}">✏️ Přejmenovat</button>
            </div>`}
          <div style="font-size:12px;color:#94a3b8;margin-bottom:8px;margin-top:${editN?8:0}px">Barva</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${USER_COLORS.map(col=>`<button data-setcolor="${uid}" data-color="${col}" style="width:30px;height:30px;border-radius:50%;background:${col};border:3px solid ${u.color===col?"#fff":"transparent"};cursor:pointer"></button>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>`;
}

function buildModal(){
  const m=state.modal;
  if(m.type==="transaction"||m.type==="edit"){
    const t=m.payload||{},type=m._type||t.type||"expense",au=getUser(state.activeUser);
    const cats=type==="income"?INCOME_CATEGORIES:EXPENSE_CATEGORIES;
    const defaultCat=type==="income"?"salary":"food";
    const selCat=m._cat||(t.category&&cats.find(c=>c.id===t.category)?t.category:defaultCat);
    return `<div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${m.type==="edit"?"Upravit transakci":"Přidat transakci"}</span>
          <button class="close-btn" id="closeModal">✕</button>
        </div>
        <div class="type-row">
          <button class="type-btn" data-txtype="expense" style="background:${type==="expense"?"#f43f5e":"#334155"}">Výdaj</button>
          <button class="type-btn" data-txtype="income" style="background:${type==="income"?"#10b981":"#334155"}">Příjem</button>
        </div>
        <input id="txAmount" placeholder="Částka (Kč)" type="number" value="${t.amount||""}"/>
        <input id="txDesc" placeholder="Popis (volitelné)" value="${t.description||""}"/>
        <input id="txDate" type="date" value="${t.date||today()}"/>
        <div class="cats">
          ${cats.map(c=>`<button class="cat-btn" data-cat="${c.id}" style="background:${selCat===c.id?c.color+"33":"#334155"};border-color:${selCat===c.id?c.color:"transparent"}">${c.icon} ${c.label}</button>`).join("")}
        </div>
        <button class="save-btn" id="saveTxBtn" style="background:${au.color}">${m.type==="edit"?"Uložit změny":"Přidat"}</button>
      </div>
    </div>`;
  }
  if(m.type==="recurring"){
    const rec=m._rec||"Měsíčně",rtype=m._rtype||"expense";
    const cats=rtype==="income"?INCOME_CATEGORIES:EXPENSE_CATEGORIES;
    const defaultCat=rtype==="income"?"salary":"food";
    const selCat=m._rcat||defaultCat;
    return `<div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Pravidelná platba</span>
          <button class="close-btn" id="closeModal">✕</button>
        </div>
        <div class="type-row">
          <button class="type-btn" data-rtype="expense" style="background:${rtype==="expense"?"#f43f5e":"#334155"}">Výdaj</button>
          <button class="type-btn" data-rtype="income" style="background:${rtype==="income"?"#10b981":"#334155"}">Příjem</button>
        </div>
        <input id="recName" placeholder="Název (např. Nájem)" value="${m._name||""}"/>
        <input id="recAmount" placeholder="Částka (Kč)" type="number" value="${m._amount||""}"/>
        <div class="cats" style="margin-bottom:14px">
          ${cats.map(c=>`<button class="cat-btn" data-rcat="${c.id}" style="background:${selCat===c.id?c.color+"33":"#334155"};border-color:${selCat===c.id?c.color:"transparent"}">${c.icon} ${c.label}</button>`).join("")}
        </div>
        <div class="rec-types">
          ${RECURRENCE.map(r=>`<button class="rec-type-btn" data-rectype="${r}" style="background:${rec===r?"#6366f1":"#334155"}">${r}</button>`).join("")}
        </div>
        <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:4px">Datum příští platby</label>
        <input id="recDate" type="date" value="${m._date||today()}"/>
        <button class="save-btn" id="saveRecBtn" style="background:#6366f1">Přidat platbu</button>
      </div>
    </div>`;
  }
  return "";
}

function attachEvents(){
  document.querySelectorAll("[data-user]").forEach(b=>b.addEventListener("click",()=>setState({activeUser:b.dataset.user})));
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>setState({tab:b.dataset.tab})));
  const fab=document.getElementById("fabBtn");
  if(fab) fab.addEventListener("click",()=>setState({modal:{type:"transaction"}}));
  document.querySelectorAll("[data-filter]").forEach(b=>b.addEventListener("click",()=>setState({filterUser:b.dataset.filter})));
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>deleteTransaction(b.dataset.del)));
  document.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>{
    const t=state.transactions.find(x=>x.id===b.dataset.edit);
    setState({modal:{type:"edit",payload:t,_type:t.type,_cat:t.category}});
  }));
  const addRec=document.getElementById("addRecBtn");
  if(addRec) addRec.addEventListener("click",()=>setState({modal:{type:"recurring"}}));
  document.querySelectorAll("[data-delrec]").forEach(b=>b.addEventListener("click",()=>deleteRecurring(b.dataset.delrec)));
  document.querySelectorAll("[data-editbudget]").forEach(b=>b.addEventListener("click",()=>setState({editingBudget:b.dataset.editbudget,budgetVal:b.dataset.budgetval})));
  document.querySelectorAll("[data-savebudget]").forEach(b=>b.addEventListener("click",()=>{
    const inp=document.getElementById("budgetInput_"+b.dataset.savebudget);
    saveBudget(b.dataset.savebudget,inp?.value||0);
    setState({editingBudget:null});
  }));
  document.querySelectorAll("[data-editname]").forEach(b=>b.addEventListener("click",()=>setState({editingName:b.dataset.editname,nameVal:b.dataset.nameval})));
  document.querySelectorAll("[data-savename]").forEach(b=>b.addEventListener("click",()=>{
    const inp=document.getElementById("nameInput_"+b.dataset.savename);
    if(inp?.value?.trim()) saveUserSettings(b.dataset.savename,{name:inp.value.trim()});
    setState({editingName:null});
  }));
  document.querySelectorAll("[data-setcolor]").forEach(b=>b.addEventListener("click",()=>saveUserSettings(b.dataset.setcolor,{color:b.dataset.color})));
  const closeBtn=document.getElementById("closeModal");
  if(closeBtn) closeBtn.addEventListener("click",()=>setState({modal:null}));
  const overlay=document.getElementById("modalOverlay");
  if(overlay) overlay.addEventListener("click",(e)=>{if(e.target===overlay)setState({modal:null});});
  // TX type – reset category when switching
  document.querySelectorAll("[data-txtype]").forEach(b=>b.addEventListener("click",()=>{
    const newType=b.dataset.txtype;
    setState({modal:{...state.modal,_type:newType,_cat:newType==="income"?"salary":"food"}});
  }));
  document.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click",()=>setState({modal:{...state.modal,_cat:b.dataset.cat}})));
  // Recurring type
  document.querySelectorAll("[data-rtype]").forEach(b=>b.addEventListener("click",()=>{
    const newType=b.dataset.rtype;
    setState({modal:{...state.modal,_rtype:newType,_rcat:newType==="income"?"salary":"food"}});
  }));
  document.querySelectorAll("[data-rcat]").forEach(b=>b.addEventListener("click",()=>setState({modal:{...state.modal,_rcat:b.dataset.rcat}})));
  document.querySelectorAll("[data-rectype]").forEach(b=>b.addEventListener("click",()=>setState({modal:{...state.modal,_rec:b.dataset.rectype}})));
  const saveTx=document.getElementById("saveTxBtn");
  if(saveTx) saveTx.addEventListener("click",async()=>{
    const amount=parseFloat(document.getElementById("txAmount")?.value);
    const desc=document.getElementById("txDesc")?.value||"";
    const date=document.getElementById("txDate")?.value||today();
    const type=state.modal._type||state.modal.payload?.type||"expense";
    const category=state.modal._cat||(type==="income"?"salary":"food");
    if(!amount||isNaN(amount)) return;
    if(state.modal.type==="edit") await updateTransaction(state.modal.payload.id,{amount,description:desc,date,type,category});
    else await addTransaction({amount,description:desc,date,type,category});
    setState({modal:null});
  });
  const saveRec=document.getElementById("saveRecBtn");
  if(saveRec) saveRec.addEventListener("click",async()=>{
    const name=document.getElementById("recName")?.value;
    const amount=parseFloat(document.getElementById("recAmount")?.value);
    const nextDate=document.getElementById("recDate")?.value||today();
    const recurrence=state.modal._rec||"Měsíčně";
    const type=state.modal._rtype||"expense";
    const category=state.modal._rcat||(type==="income"?"salary":"food");
    if(!name||!amount) return;
    await addRecurring({name,amount,recurrence,nextDate,type,category});
    setState({modal:null});
  });
}

render();
</script>
</body>
</html>
